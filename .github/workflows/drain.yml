name: Drain "didn't remember" taps

on:
  schedule:
    # Twice a day, well inside Telegram's ~24h update-retention window so no tap
    # is ever dropped. 03:00 UTC is just after the last send (02:00) and before
    # the quiz (04:00); 15:00 UTC clears overnight taps before sends resume (16:00).
    - cron: "0 3,15 * * *"
  workflow_dispatch:

# Shared with vocab.yml so the two never push to the data repo simultaneously.
concurrency:
  group: vocab-repo-write
  cancel-in-progress: false

jobs:
  drain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/checkout@v5
        with:
          repository: SpacePiercer/vocablurry-data
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: data-repo
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python drain_updates.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          VOCAB_DATA_DIR: data-repo/data
      - name: Commit forgotten-word log
        working-directory: data-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/review data/state
          if git diff --staged --quiet; then
            echo "No review changes to commit."
          else
            git commit -m "Log forgotten words [skip ci]"
            git pull --rebase
            git push
          fi
