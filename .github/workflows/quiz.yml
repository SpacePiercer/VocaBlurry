name: Send vocab quiz

on:
  schedule:
    # 9 PM Vancouver (04:00 UTC during PDT; 8 PM local in winter/PST).
    - cron: "0 4 * * *"
  workflow_dispatch:

# Shared with vocab.yml/drain.yml so pushes to the data repo never race.
concurrency:
  group: vocab-repo-write
  cancel-in-progress: false

jobs:
  quiz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/checkout@v5
        with:
          repository: SpacePiercer/vocablurry-data
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: data-repo
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python send_quiz.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VOCAB_DATA_DIR: data-repo/data
      - name: Commit pending polls + word pool
        working-directory: data-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state/pending_polls.json data/review/words.json
          if git diff --staged --quiet; then
            echo "No quiz state changes to commit."
          else
            git commit -m "Record quiz polls [skip ci]"
            git pull --rebase
            git push
          fi
