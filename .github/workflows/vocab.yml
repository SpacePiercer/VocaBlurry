name: Send vocab word

on:
  schedule:
    # Every 2h during Vancouver daytime: ~9am-7pm PDT (16:00-02:00 UTC).
    # Cron is UTC, so in winter (PST) this shifts to 8am-6pm local.
    # Offset to :17 — GitHub drops/delays runs scheduled at the top of the hour.
    - cron: "17 16,18,20,22,0,2 * * *"
  workflow_dispatch:

# Data lives in the private repo; pushes there are serialized with drain.yml.
concurrency:
  group: vocab-repo-write
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/checkout@v5
        with:
          repository: SpacePiercer/vocablurry-data
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: data-repo
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python send_word.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VOCAB_DATA_DIR: data-repo/data
      - name: Commit today's word log
        working-directory: data-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily
          if git diff --staged --quiet; then
            echo "No log changes to commit."
          else
            git commit -m "Log vocab word [skip ci]"
            git pull --rebase
            git push
          fi
